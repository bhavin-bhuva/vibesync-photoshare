services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: photo_share
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d photo_share"]
      interval: 5s
      timeout: 5s
      retries: 10

  face-service:
    build: ./services/face-service
    restart: unless-stopped
    env_file:
      - .env.local
    ports:
      - "8000:8000"
    volumes:
      # Persist downloaded models across rebuilds — avoids re-downloading 300 MB
      - face_models:/app/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  app:
    build:
      context: .
      target: dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/photo_share
      NEXTAUTH_URL: http://localhost:3000
      NODE_ENV: development
      CLOUDFRONT_PRIVATE_KEY_PATH: /app/private_key.pem
      FACE_SERVICE_URL: http://face-service:8000
      CRON_SECRET: ${CRON_SECRET:-dev-cron-secret}
    volumes:
      - .:/app
      # keep the container's node_modules; don't override with host's
      - /app/node_modules
      # keep next build cache inside the container
      - /app/.next
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  face_models:
