services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: photo_share
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d photo_share"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      target: dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/photo_share
      NEXTAUTH_URL: http://localhost:3000
      NODE_ENV: development
      CLOUDFRONT_PRIVATE_KEY_PATH: /app/private_key.pem
    volumes:
      - .:/app
      # keep the container's node_modules; don't override with host's
      - /app/node_modules
      # keep next build cache inside the container
      - /app/.next
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
